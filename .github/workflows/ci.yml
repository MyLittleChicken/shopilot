# CI — 타입체크·테스트·빌드를 PR 게이트로 강제한다.
# 타입체크가 기본 게이트(.claude/testing.md). vitest가 실재화됐으므로 test를, web·widget 연결을
# 검증하려 build를 강제한다(Next 'use client'·vite IIFE·import.meta.env는 빌드로만 잡힘).
# 린트(eslint)는 아직 실재화 전이라 넣지 않는다 — 아무것도 검사하지 않는 스텝은 '가짜 초록'이 된다.
name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  typecheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # packageManager 필드(pnpm@11.5.2)를 읽어 버전을 맞춘다.
      - uses: pnpm/action-setup@v4

      # pnpm@11.5.2(packageManager)는 Node >=22.13을 요구한다(node:sqlite 의존). Node 20은 크래시.
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm -r typecheck
      - run: pnpm -r test
      - run: pnpm build
